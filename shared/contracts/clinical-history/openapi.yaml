openapi: 3.0.3
info:
  title: Clinical History Service API
  version: 1.1.0
  description: Mascotas e historial clínico — VetCare System
servers:
  - url: http://localhost:3002/api/v1
paths:
  /pets:
    get:
      summary: Listar mascotas
      tags: [Pets]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de mascotas
    post:
      summary: Registrar mascota
      tags: [Pets]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetInput'
      responses:
        '201':
          description: Mascota creada
  /pets/{id}:
    get:
      summary: Detalle de mascota
      tags: [Pets]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Mascota encontrada
        '404':
          description: No encontrada
    put:
      summary: Editar mascota
      tags: [Pets]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetInput'
      responses:
        '200':
          description: Mascota actualizada
    delete:
      summary: Eliminar mascota
      tags: [Pets]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Mascota eliminada
  /pets/{id}/owner-notes:
    patch:
      summary: Información complementaria del dueño (hábitos, alimentación, síntomas)
      tags: [Pets]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OwnerNotes'
      responses:
        '200':
          description: Notas actualizadas
        '403':
          description: Sin permisos
  /patients/{petId}/records:
    get:
      summary: Obtener historial clínico
      tags: [Records]
      security:
        - bearerAuth: []
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Historial retornado
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pet:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        species:
          type: string
        breed:
          type: string
        age:
          type: number
        weight:
          type: number
        ownerId:
          type: string
        ownerName:
          type: string
        photo:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        ownerNotes:
          $ref: '#/components/schemas/OwnerNotes'
    OwnerNotes:
      type: object
      properties:
        habits:
          type: string
        feeding:
          type: string
        symptoms:
          type: string
    PetInput:
      type: object
      required: [name, species, breed, age, weight]
      properties:
        name:
          type: string
        species:
          type: string
        breed:
          type: string
        age:
          type: number
        weight:
          type: number
        ownerId:
          type: string
        ownerName:
          type: string
        photo:
          type: string
          nullable: true
